<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Drive</title> <!-- Sneaky Tab Title -->
    <link rel="icon" href="https://ssl.gstatic.com">
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #000; overflow: hidden;
            font-family: 'Segoe UI', sans-serif; color: #fff;
        }

        /* Moving Starfield Background */
        #star-canvas { position: absolute; top: 0; left: 0; z-index: 1; }

        .ui-layer {
            position: relative; z-index: 10;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100%; text-align: center;
            background: radial-gradient(circle, rgba(0,212,255,0.05) 0%, rgba(0,0,0,1) 70%);
        }

        h1 { font-size: 4rem; letter-spacing: 12px; margin: 0; text-shadow: 0 0 20px #00d4ff; color: #00d4ff; }
        p { color: #555; letter-spacing: 2px; margin-bottom: 30px; }

        .game-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 20px; max-width: 800px;
        }

        .game-card {
            padding: 20px; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(0,212,255,0.2); border-radius: 15px;
            cursor: pointer; transition: 0.3s; text-decoration: none; color: #fff;
        }

        .game-card:hover {
            background: #00d4ff; color: #000;
            box-shadow: 0 0 30px #00d4ff; transform: translateY(-5px);
        }

        /* The Panic Key Hint */
        .panic-hint { position: fixed; bottom: 10px; right: 10px; color: #333; font-size: 10px; }
    </style>
</head>
<body>
    <canvas id="star-canvas"></canvas>

    <div class="ui-layer">
        <h1>NexSTEP</h1>
        <p>GALAXY EDITION • UNBLOCKED</p>

        <div class="game-grid">
            <!-- ADD YOUR GAME LINKS BELOW -->
            <a href="games/paperio2.html" class="game-card">Paper.io 2</a>
            <a href="games/whg1.html" class="game-card">Hardest Game</a>
            <a href="games/snake.html" class="game-card">NexSTEP Snake</a>
            <a href="games/wordle.html" class="game-card">Wordle</a>
            <a href="games/2048.html" class="game-card">2048</a>
            <a href="proxies.html" class="game-card">GALAXY PROXY</a>
        </div>
    </div>

    <div class="panic-hint">Press [ESC] to Panic Close</div>

    <script>
        // 1. STARFIELD ANIMATION
        const canvas = document.getElementById('star-canvas');
        const ctx = canvas.getContext('2d');
        let stars = [];
        const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
        window.addEventListener('resize', resize);
        resize();

        class Star {
            constructor() { this.x = Math.random()*canvas.width; this.y = Math.random()*canvas.height; this.z = Math.random()*canvas.width; }
            move() { this.z -= 2; if(this.z <= 0) this.z = canvas.width; }
            show() {
                let sx = (this.x - canvas.width/2) * (canvas.width/this.z) + canvas.width/2;
                let sy = (this.y - canvas.height/2) * (canvas.width/this.z) + canvas.height/2;
                let r = (1 - this.z/canvas.width) * 3;
                ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI*2); ctx.fill();
            }
        }
        for(let i=0; i<400; i++) stars.push(new Star());
        const draw = () => { ctx.fillStyle="#000"; ctx.fillRect(0,0,canvas.width,canvas.height); stars.forEach(s=>{s.move(); s.show();}); requestAnimationFrame(draw); };
        draw();

        // 2. PANIC KEY (Closes tab instantly if someone walks by)
        window.addEventListener('keydown', (e) => {
            if (e.key === "Escape") window.location.replace("https://classroom.google.com");
        });

        // 3. AUTO-CLOAK ON LOAD
        // This keeps the URL as "about:blank" in the top bar
        (function() {
            if (window.location.href.indexOf('about:blank') === -1 && window.top === window.self) {
                const win = window.open();
                win.document.body.style.margin = '0';
                win.document.body.style.height = '100vh';
                const iframe = win.document.createElement('iframe');
                iframe.style.border = 'none'; iframe.style.width = '100%'; iframe.style.height = '100%';
                iframe.src = window.location.href;
                win.document.body.appendChild(iframe);
                window.location.replace('https://google.com'); // Leaves the original tab on Google
            }
        })();
    </script>
</body>
</html>
