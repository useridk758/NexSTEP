<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Drive</title>
    <link rel="icon" href="https://ssl.gstatic.com">
    <style>
        :root { --accent: #00d4ff; --bg: rgba(0, 0, 0, 0.95); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; color: #fff; }
        
        #star-canvas { position: absolute; top: 0; left: 0; z-index: 1; }

        /* Main UI */
        .ui-layer {
            position: relative; z-index: 10; display: flex; flex-direction: column;
            align-items: center; justify-content: center; height: 100vh; text-align: center;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.8s;
        }
        .ui-layer.blur { transform: scale(0.9); opacity: 0; pointer-events: none; }

        h1 { font-size: 5rem; letter-spacing: 15px; margin: 0; text-shadow: 0 0 20px var(--accent); color: var(--accent); }
        .sub-text { color: #555; letter-spacing: 3px; font-weight: bold; }

        /* Bottom Nav Bar */
        .bottom-nav {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 100; display: flex; gap: 15px; background: rgba(0, 0, 0, 0.6);
            padding: 10px 20px; border-radius: 50px; border: 1px solid rgba(0, 212, 255, 0.3);
            backdrop-filter: blur(10px); transition: 0.5s;
        }

        .nav-btn {
            padding: 8px 20px; background: rgba(255,255,255,0.05); border: 1px solid rgba(0,212,255,0.2);
            border-radius: 20px; cursor: pointer; transition: 0.3s; color: #fff;
            font-weight: bold; text-transform: uppercase; font-size: 0.8rem;
        }
        .nav-btn:hover { background: var(--accent); color: #000; box-shadow: 0 0 20px var(--accent); }

        /* Full Screen Overlay System */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 50; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transform: translateY(20px);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .overlay.active { opacity: 1; pointer-events: all; transform: translateY(0); }

        /* Game Card Styling */
        .game-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 30px; width: 80%; max-width: 1000px; }
        .game-item { 
            text-decoration: none; color: white; display: flex; flex-direction: column; align-items: center; 
            transition: 0.3s; padding: 15px; border-radius: 15px; background: rgba(255,255,255,0.03);
        }
        .game-item:hover { transform: scale(1.1); background: rgba(0,212,255,0.1); }
        .game-item img { width: 100px; height: 100px; border-radius: 20px; margin-bottom: 10px; border: 2px solid var(--accent); }

        .close-overlay { margin-top: 50px; cursor: pointer; color: var(--accent); font-weight: bold; letter-spacing: 2px; }

        .panic-hint { position: fixed; bottom: 15px; right: 15px; color: #333; font-size: 11px; z-index: 110; }
    </style>
</head>
<body>
    <canvas id="star-canvas"></canvas>

    <div id="main-ui" class="ui-layer">
        <h1>NexSTEP</h1>
        <div class="sub-text">GALAXY EDITION</div>
    </div>

    <!-- Nav -->
    <div class="bottom-nav">
        <div class="nav-btn" onclick="openMenu('gamesMenu')">Games</div>
        <div class="nav-btn" onclick="openMenu('creditsMenu')">Credits</div>
        <div class="nav-btn" onclick="openMenu('settingsMenu')">Settings</div>
    </div>

    <!-- Games Fullscreen -->
    <div id="gamesMenu" class="overlay">
        <h2 style="color: var(--accent); font-size: 3rem; margin-bottom: 40px;">LIBRARY</h2>
        <div class="game-grid">
            <a href="https://useridk758.github.io/my-html-games/" class="game-item">
                <img src="https://img.utdstc.com/icon/983/22a/98322a3b2be892eed31589906ffd949b68bcccc9a21ba562987965b5ec6bc6de:200" alt="1v1.lol">
                <span>1v1.LOL</span>
            </a>
        </div>
        <div class="close-overlay" onclick="closeMenus()">[ BACK TO GALAXY ]</div>
    </div>

    <!-- Credits Fullscreen -->
    <div id="creditsMenu" class="overlay">
        <h2 style="color: var(--accent); font-size: 3rem;">CREDITS</h2>
        <p style="font-size: 1.5rem;">Everything made by <span style="color: var(--accent); font-weight: bold;">Dunko</span></p>
        <div class="close-overlay" onclick="closeMenus()">[ BACK TO GALAXY ]</div>
    </div>

    <!-- Settings Fullscreen -->
    <div id="settingsMenu" class="overlay">
        <h2 style="color: var(--accent); font-size: 3rem;">SETTINGS</h2>
        <p>Panic Key: <strong>ESC</strong></p>
        <p>Current Tab: <strong>Google Drive Cloak</strong></p>
        <div class="close-overlay" onclick="closeMenus()">[ BACK TO GALAXY ]</div>
    </div>

    <div class="panic-hint">Press [ESC] to Panic Close</div>

    <script>
        // 1. CLOAKING
        window.onload = function() {
            if (window.parent !== window.self) return;
            if (confirm("Proceed to about:blank mode for stealth?")) {
                const win = window.open();
                if (!win) return alert("Pop-up blocked!");
                win.document.body.style.margin = '0';
                win.document.body.style.height = '100vh';
                win.document.body.style.overflow = 'hidden';
                const iframe = win.document.createElement('iframe');
                iframe.style = "border:none;width:100%;height:100%;";
                iframe.src = window.location.href;
                win.document.body.appendChild(iframe);
                window.location.replace('https://google.com');
            }
        };

        // 2. PANIC KEY
        window.addEventListener('keydown', (e) => {
            if (e.key === "Escape") window.location.replace("https://classroom.google.com");
        });

        // 3. UI TRANSITIONS
        function openMenu(id) {
            document.getElementById('main-ui').classList.add('blur');
            document.getElementById(id).classList.add('active');
        }

        function closeMenus() {
            document.getElementById('main-ui').classList.remove('blur');
            document.querySelectorAll('.overlay').forEach(m => m.classList.remove('active'));
        }

        // 4. STARFIELD
        const canvas = document.getElementById('star-canvas');
        const ctx = canvas.getContext('2d');
        let stars = [];
        const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
        window.addEventListener('resize', resize); resize();

        class Star {
            constructor() { this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height; this.z = Math.random() * canvas.width; }
            move() { this.z -= 1.5; if(this.z <= 0) this.z = canvas.width; }
            show() {
                let sx = (this.x - canvas.width/2) * (canvas.width/this.z) + canvas.width/2;
                let sy = (this.y - canvas.height/2) * (canvas.width/this.z) + canvas.height/2;
                let r = (1 - this.z/canvas.width) * 2.5;
                ctx.fillStyle = "rgba(255, 255, 255, " + (1 - this.z/canvas.width) + ")";
                ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI*2); ctx.fill();
            }
        }
        for(let i=0; i<450; i++) stars.push(new Star());
        const draw = () => {
            ctx.fillStyle="#000"; ctx.fillRect(0,0,canvas.width,canvas.height);
            stars.forEach(s=>{s.move(); s.show();});
            requestAnimationFrame(draw);
        };
        draw();
    </script>
</body>
</html>
