<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexSTEP | Galaxy Edition</title>
    <style>
        /* Black Galaxy Theme */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #000; overflow: hidden;
            font-family: 'Segoe UI', sans-serif; color: #fff;
            display: flex; justify-content: center; align-items: center;
        }

        /* Animated Starfield */
        #star-canvas { position: absolute; top: 0; left: 0; z-index: 0; }

        .container {
            z-index: 10; text-align: center;
            background: rgba(10, 10, 20, 0.8);
            padding: 40px; border-radius: 20px;
            border: 1px solid rgba(0, 212, 255, 0.3);
            box-shadow: 0 0 50px rgba(0, 212, 255, 0.2);
            backdrop-filter: blur(10px);
        }

        h1 { font-size: 3rem; letter-spacing: 8px; margin: 0; text-shadow: 0 0 15px #00d4ff; }
        p { color: #888; font-size: 1.1rem; margin-top: 10px; }
        
        .launch-btn {
            margin-top: 30px; padding: 15px 40px;
            background: transparent; color: #00d4ff;
            border: 2px solid #00d4ff; border-radius: 50px;
            font-weight: bold; cursor: pointer; transition: 0.3s;
            text-transform: uppercase; letter-spacing: 2px;
        }

        .launch-btn:hover { background: #00d4ff; color: #000; box-shadow: 0 0 30px #00d4ff; }
    </style>
</head>
<body>
    <canvas id="star-canvas"></canvas>
    <div class="container">
        <h1>NexSTEP</h1>
        <p>Advanced Game Environment & Proxy Hub</p>
        <button class="launch-btn" onclick="openCloaked()">Initiate Launch</button>
    </div>

    <script>
        // 1. STARFIELD ANIMATION
        const canvas = document.getElementById('star-canvas');
        const ctx = canvas.getContext('2d');
        let stars = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Star {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2;
                this.speed = Math.random() * 0.5;
            }
            draw() {
                ctx.fillStyle = "#fff";
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
            update() {
                this.y += this.speed;
                if (this.y > canvas.height) this.y = 0;
            }
        }

        function init() {
            resize();
            stars = [];
            for (let i = 0; i < 200; i++) stars.push(new Star());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            stars.forEach(s => { s.update(); s.draw(); });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', init);
        init(); animate();

        // 2. ADVANCED TAB CLOAKING (ABOUT:BLANK)
        function openCloaked() {
            const url = window.location.href; // Hosts this exact page into the blank tab
            const win = window.open('about:blank', '_blank');
            
            if (!win) {
                alert("Pop-up blocked! Please allow pop-ups to use Cloak Mode.");
                return;
            }

            // Fake identity for the tab
            win.document.title = "Google Drive";
            const favicon = win.document.createElement('link');
            favicon.rel = 'icon';
            favicon.href = 'https://ssl.gstatic.com';
            win.document.head.appendChild(favicon);

            // Fullscreen Iframe Injection
            const iframe = win.document.createElement('iframe');
            iframe.style.cssText = "position:fixed;top:0;left:0;bottom:0;right:0;width:100%;height:100%;border:none;margin:0;padding:0;overflow:hidden;z-index:999999;";
            
            // Critical: Using a Blob to bypass X-Frame restrictions
            const htmlContent = document.documentElement.outerHTML;
            const blob = new Blob([htmlContent], { type: 'text/html' });
            iframe.src = URL.createObjectURL(blob);

            win.document.body.appendChild(iframe);

            // Redirect original tab to a safe site
            window.location.replace("https://google.com");
        }
    </script>
</body>
</html>
