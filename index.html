<style>
    body, html {
        margin: 0; padding: 0; width: 100%; height: 100%;
        background: #000; overflow: hidden;
        font-family: 'Segoe UI', sans-serif; color: #fff;
    }

    #star-canvas { position: absolute; top: 0; left: 0; z-index: 1; }

    /* Main UI Layer */
    .ui-layer {
        position: relative; z-index: 10;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        height: 100vh; text-align: center;
        pointer-events: none; /* Let clicks pass through to background if needed */
    }

    h1 { font-size: 5rem; letter-spacing: 15px; margin: 0; text-shadow: 0 0 20px #00d4ff; color: #00d4ff; }
    p { color: #555; letter-spacing: 3px; font-weight: bold; }

    /* Bottom Navigation Bar */
    .bottom-nav {
        position: fixed; bottom: 30px; left: 50%;
        transform: translateX(-50%); z-index: 20;
        display: flex; gap: 15px;
        background: rgba(0, 0, 0, 0.6);
        padding: 10px 20px; border-radius: 50px;
        border: 1px solid rgba(0, 212, 255, 0.3);
        backdrop-filter: blur(10px);
    }

    .nav-btn {
        padding: 8px 20px; background: rgba(255,255,255,0.05);
        border: 1px solid rgba(0,212,255,0.2); border-radius: 20px;
        cursor: pointer; transition: 0.3s; color: #fff;
        font-weight: bold; text-transform: uppercase; font-size: 0.8rem;
    }

    .nav-btn:hover { background: #00d4ff; color: #000; box-shadow: 0 0 15px #00d4ff; }

    /* Modal Styling */
    .modal {
        display: none; position: fixed; z-index: 30;
        top: 50%; left: 50%; transform: translate(-50%, -50%);
        background: rgba(0, 0, 0, 0.9); border: 1px solid #00d4ff;
        padding: 30px; border-radius: 15px; width: 300px; text-align: center;
    }

    .modal.active { display: block; }
    .close-modal { margin-top: 20px; cursor: pointer; color: #00d4ff; font-size: 0.8rem; text-decoration: underline; }

    .game-list-vertical { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
    .game-list-vertical a { color: #fff; text-decoration: none; padding: 5px; border-bottom: 1px solid #222; }
    .game-list-vertical a:hover { color: #00d4ff; }

    .panic-hint { position: fixed; bottom: 15px; right: 15px; color: #333; font-size: 11px; }
</style>

<body>
    <canvas id="star-canvas"></canvas>

    <div class="ui-layer">
        <h1>NexSTEP</h1>
        <p>GALAXY EDITION</p>
    </div>

    <!-- Bottom Nav -->
    <div class="bottom-nav">
        <div class="nav-btn" onclick="toggleModal('gamesModal')">Games</div>
        <div class="nav-btn" onclick="toggleModal('creditsModal')">Credits</div>
    </div>

    <!-- Games Modal -->
    <div id="gamesModal" class="modal">
        <h2 style="color:#00d4ff; margin-top:0;">Library</h2>
        <div class="game-list-vertical">
            <a href="games/paperio2.html">Paper.io 2</a>
            <a href="games/whg1.html">Hardest Game</a>
            <a href="games/snake.html">NexSTEP Snake</a>
            <a href="games/wordle.html">Wordle</a>
            <a href="games/2048.html">2048</a>
            <a href="games/8ball.html">8-Ball Pool</a>
        </div>
        <div class="close-modal" onclick="toggleModal('gamesModal')">[ CLOSE ]</div>
    </div>

    <!-- Credits Modal -->
    <div id="creditsModal" class="modal">
        <h2 style="color:#00d4ff; margin-top:0;">Credits</h2>
        <p style="color: #fff;">Everything made by <strong>Dunko</strong></p>
        <div class="close-modal" onclick="toggleModal('creditsModal')">[ CLOSE ]</div>
    </div>

    <div class="panic-hint">Press [ESC] to Panic Close</div>

    <script>
        // Modal Logic
        function toggleModal(id) {
            const modal = document.getElementById(id);
            const isVisible = modal.classList.contains('active');
            // Close all modals first
            document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
            // Toggle the clicked one
            if (!isVisible) modal.classList.add('active');
        }

        /* Keep all your existing Starfield, Panic Key, and Cloaking JS below here */
        // ... (Paste your original <script> logic for the stars and cloaking)
    </script>
</body>
