<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Drive</title> <!-- Sneaky Tab Title -->
    <link rel="icon" href="https://ssl.gstatic.com">
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #000; overflow: hidden;
            font-family: 'Segoe UI', sans-serif; color: #fff;
        }

        /* Deep Space Starfield */
        #star-canvas { position: absolute; top: 0; left: 0; z-index: 1; }

        .ui-layer {
            position: relative; z-index: 10;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100vh; text-align: center;
            pointer-events: none;
        }

        h1 { font-size: 4rem; letter-spacing: 12px; margin: 0; text-shadow: 0 0 20px #00d4ff; color: #00d4ff; }
        .sub-text { color: #555; letter-spacing: 2px; font-weight: bold; margin-top: 10px; }

        /* Small Bottom Navigation */
        .bottom-nav {
            position: fixed; bottom: 30px; left: 50%;
            transform: translateX(-50%); z-index: 20;
            display: flex; gap: 15px;
            background: rgba(0, 0, 0, 0.6);
            padding: 8px 15px; border-radius: 50px;
            border: 1px solid rgba(0, 212, 255, 0.3);
            backdrop-filter: blur(10px);
        }

        .nav-btn {
            padding: 6px 18px; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(0,212,255,0.2); border-radius: 20px;
            cursor: pointer; transition: 0.3s; color: #fff;
            font-weight: bold; text-transform: uppercase; font-size: 0.75rem;
        }

        .nav-btn:hover { background: #00d4ff; color: #000; box-shadow: 0 0 15px #00d4ff; }

        /* Modals */
        .modal {
            display: none; position: fixed; z-index: 30;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(10, 10, 10, 0.95); border: 1px solid #00d4ff;
            padding: 25px; border-radius: 15px; width: 280px; text-align: center;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.2);
        }

        .modal.active { display: block; }
        
        .game-list-vertical { display: flex; flex-direction: column; gap: 12px; margin-top: 15px; }
        .game-list-vertical a { 
            color: #fff; text-decoration: none; padding: 8px; 
            background: rgba(255,255,255,0.05); border-radius: 8px;
            transition: 0.2s; font-size: 0.9rem;
        }
        .game-list-vertical a:hover { background: #00d4ff; color: #000; }

        .close-btn { margin-top: 20px; cursor: pointer; color: #00d4ff; font-size: 0.7rem; letter-spacing: 1px; }

        .panic-hint { position: fixed; bottom: 15px; right: 15px; color: #333; font-size: 11px; z-index: 25; }
    </style>
</head>
<body>
    <canvas id="star-canvas"></canvas>

    <div class="ui-layer">
        <h1>NexSTEP</h1>
        <div class="sub-text">GALAXY EDITION • CLOAKED</div>
    </div>

    <!-- Bottom Nav Bar -->
    <div class="bottom-nav">
        <div class="nav-btn" onclick="toggleModal('gamesModal')">Games</div>
        <div class="nav-btn" onclick="toggleModal('creditsModal')">Credits</div>
    </div>

    <!-- Games List Modal -->
    <div id="gamesModal" class="modal">
        <h3 style="color:#00d4ff; margin:0;">LIBRARY</h3>
        <div class="game-list-vertical">
            <a href="games/paperio2.html">Paper.io 2</a>
            <a href="games/whg1.html">Hardest Game</a>
            <a href="games/snake.html">NexSTEP Snake</a>
            <a href="games/wordle.html">Wordle</a>
            <a href="games/2048.html">2048</a>
            <a href="games/8ball.html">8-Ball Pool</a>
        </div>
        <div class="close-btn" onclick="toggleModal('gamesModal')">[ CLOSE ]</div>
    </div>

    <!-- Credits Modal -->
    <div id="creditsModal" class="modal">
        <h3 style="color:#00d4ff; margin:0;">CREDITS</h3>
        <p style="font-size: 0.9rem; margin-top: 15px;">Everything made by<br><strong style="font-size: 1.2rem;">Dunko</strong></p>
        <div class="close-btn" onclick="toggleModal('creditsModal')">[ CLOSE ]</div>
    </div>

    <div class="panic-hint">Press [ESC] to Panic Close</div>

    <script>
        // 1. CLOAKING LOGIC (About:Blank)
        window.onload = function() {
            if (window.parent !== window.self) return; // Prevent loops inside the iframe

            const userChoice = confirm("Proceed to about:blank mode for stealth browsing?");
            if (userChoice) {
                const win = window.open();
                if (!win) {
                    alert("Pop-up blocked! Allow pop-ups for stealth mode.");
                    return;
                }
                win.document.body.style.margin = '0';
                win.document.body.style.height = '100vh';
                win.document.body.style.overflow = 'hidden';
                
                const iframe = win.document.createElement('iframe');
                iframe.style.border = 'none'; 
                iframe.style.width = '100%'; 
                iframe.style.height = '100%';
                iframe.src = window.location.href; 
                
                win.document.body.appendChild(iframe);
                window.location.replace('https://google.com'); 
            }
        };

        // 2. PANIC KEY
        window.addEventListener('keydown', (e) => {
            if (e.key === "Escape") window.location.replace("https://classroom.google.com");
        });

        // 3. UI LOGIC
        function toggleModal(id) {
            const modal = document.getElementById(id);
            const isActive = modal.classList.contains('active');
            document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
            if (!isActive) modal.classList.add('active');
        }

        // 4. STARFIELD ANIMATION
        const canvas = document.getElementById('star-canvas');
        const ctx = canvas.getContext('2d');
        let stars = [];
        const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
        window.addEventListener('resize', resize);
        resize();

        class Star {
            constructor() { 
                this.x = Math.random() * canvas.width; 
                this.y = Math.random() * canvas.height; 
                this.z = Math.random() * canvas.width; 
            }
            move() { 
                this.z -= 1.5; 
                if(this.z <= 0) this.z = canvas.width; 
            }
            show() {
                let sx = (this.x - canvas.width/2) * (canvas.width/this.z) + canvas.width/2;
                let sy = (this.y - canvas.height/2) * (canvas.width/this.z) + canvas.height/2;
                let r = (1 - this.z/canvas.width) * 2.5;
                ctx.fillStyle = "rgba(255, 255, 255, " + (1 - this.z/canvas.width) + ")"; 
                ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI*2); ctx.fill();
            }
        }
        for(let i=0; i<450; i++) stars.push(new Star());
        const draw = () => { 
            ctx.fillStyle="#000"; ctx.fillRect(0,0,canvas.width,canvas.height); 
            stars.forEach(s=>{s.move(); s.show();}); 
            requestAnimationFrame(draw); 
        };
        draw();
    </script>
</body>
</html>
